<div id="nespeshnye-btc-terminal">
    <div class="btc-label-terminal">TIME UNTIL THE FINAL SATOSHI (EST. 2140)</div>
    <div id="btc-countdown-display">INITIALIZING...</div>
</div>

<style>
    /* Стили изолированы только для этого блока */
    #nespeshnye-btc-terminal {
        border: 1px dashed rgba(212, 175, 55, 0.2); /* Едва заметная пунктирная рамка */
        padding: 30px;
        background: rgba(26, 22, 18, 0.4); /* Полупрозрачный фон в тон вашего сайта */
        margin: 40px auto;
        text-align: center;
        max-width: 100%;
        border-radius: 2px;
    }

    .btc-label-terminal {
        font-family: 'Lora', serif;
        font-size: 12px;
        color: #d4af37; /* Приглушенное золото */
        letter-spacing: 0.2em;
        margin-bottom: 15px;
        opacity: 0.6;
    }

    #btc-countdown-display {
        font-family: 'Lora', serif;
        color: #ff9d00; /* Янтарный цвет терминала Fallout */
        font-size: 28px;
        font-weight: 700;
        text-shadow: 0 0 8px rgba(255, 157, 0, 0.3);
        letter-spacing: 0.05em;
    }

    /* Адаптивность для мобильных */
    @media (max-width: 600px) {
        #btc-countdown-display { font-size: 20px; }
    }
</style>

<script>
    (function() {
        // Константа даты 2140 года
        const targetDate = new Date("Jan 1, 2140 00:00:00").getTime();

        const updateTimer = function() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff < 0) {
                document.getElementById("btc-countdown-display").innerHTML = "THE ERA HAS ENDED";
                return;
            }

            const y = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
            const d = Math.floor((diff % (1000 * 60 * 60 * 24 * 365.25)) / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            // Форматируем вывод: добавляем нули перед цифрами, если нужно
            const format = (num) => String(num).padStart(2, '0');

            document.getElementById("btc-countdown-display").innerHTML = 
                y + "y " + d + "d " + format(h) + ":" + format(m) + ":" + format(s);
        };

        setInterval(updateTimer, 1000);
        updateTimer(); // Запуск сразу при загрузке
    })();
</script>
