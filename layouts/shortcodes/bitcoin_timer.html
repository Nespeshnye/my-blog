<div class="timer-outer-wrapper" style="width: 100%; display: flex; justify-content: center; margin: 30px 0;">
    <div class="btc-timer-card" style="
        background: #000; 
        color: #f7931a; 
        padding: 30px 15px; 
        border-radius: 15px; 
        border: 2px solid #f7931a; 
        text-align: center; 
        width: 100%; 
        max-width: 500px;
        box-shadow: 0 10px 30px rgba(247, 147, 26, 0.2);
    ">
        <div style="font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 10px; text-transform: uppercase; opacity: 0.9;">
            TIME UNTIL THE FINAL SATOSHI
        </div>
        
        <div id="timer-display" style="
            font-family: 'Courier New', Courier, monospace; 
            font-size: 2.8rem; 
            font-weight: 900; 
            line-height: 1; 
            margin-bottom: 10px;
        ">
            00Y 000D 00H 00M 00S
        </div>
        
        <div style="font-size: 1rem; font-weight: bold; opacity: 0.8;">
            (EST. 2140)
        </div>
    </div>
</div>

<style>
    /* Магия для мобильных: увеличиваем шрифт, чтобы цифры не "разваливались" */
    @media screen and (max-width: 600px) {
        #timer-display {
            font-size: 1.8rem !important; /* Крупный шрифт на смартфоне */
        }
        .btc-timer-card {
            padding: 20px 10px !important;
            margin: 0 10px; /* Чтобы не прилипало к краям экрана */
        }
    }
</style>

<script>
    function updateBtcTimer() {
        const targetDate = new Date("January 1, 2140 00:00:00").getTime();
        const now = new Date().getTime();
        const diff = targetDate - now;

        if (diff < 0) return;

        const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
        const days = Math.floor((diff % (1000 * 60 * 60 * 24 * 365.25)) / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        // Форматируем, чтобы всегда было две цифры (01 вместо 1)
        const format = (num) => String(num).padStart(2, '0');

        document.getElementById("timer-display").innerHTML = 
            years + "Y " + days + "D " + format(hours) + "H " + format(minutes) + "M " + format(seconds) + "S";
    }
    setInterval(updateBtcTimer, 1000);
    updateBtcTimer();
</script>
