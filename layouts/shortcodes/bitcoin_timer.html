<div class="btc-container" style="
    text-align: center; 
    margin: 40px auto; 
    max-width: 600px; 
    padding: 20px; 
    background: #1a1a1a; 
    color: #f7931a; 
    border: 1px solid #333; 
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
">
    <div style="font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 15px; opacity: 0.8;">
        TIME UNTIL THE FINAL SATOSHI
    </div>
    
    <div id="timer-display" style="
        font-family: 'Courier New', monospace; 
        font-size: 2.2rem; 
        font-weight: bold; 
        color: #f7931a;
        line-height: 1.2;
    ">
        Загрузка...
    </div>
</div>

<style>
    /* Этот блок сделает текст под таймером тоже по центру */
    #btc-container + p {
        text-align: center;
        font-size: 1.2rem;
        color: #555;
        margin-top: 20px;
    }
    /* Для мобильных телефонов делаем шрифт чуть крупнее */
    @media (max-width: 600px) {
        #timer-display { font-size: 1.6rem !important; }
    }
</style>

<script>
    function updateBtcTimer() {
        const targetDate = new Date("January 1, 2140 00:00:00").getTime();
        const now = new Date().getTime();
        const diff = targetDate - now;

        const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
        const days = Math.floor((diff % (1000 * 60 * 60 * 24 * 365.25)) / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

        document.getElementById("timer-display").innerHTML = 
            years + "Y " + days + "D " + hours + "H";
    }
    setInterval(updateBtcTimer, 1000);
    updateBtcTimer();
</script>
