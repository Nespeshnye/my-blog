<div style="width: 100%; display: flex; justify-content: center; margin: 20px 0;">
    <div id="btc-countdown" style="
        text-align: center; 
        padding: 15px; 
        font-family: 'Courier New', monospace; 
        color: #333; 
        border-bottom: 2px solid #f7931a; 
        display: inline-block;
        min-width: 280px;
    ">
        <div style="font-size: 0.8rem; letter-spacing: 2px; color: #f7931a; font-weight: bold; margin-bottom: 5px;">
            TIME UNTIL THE FINAL SATOSHI
        </div>
        
        <div id="timer-display" style="
            font-size: 2.2rem; 
            font-weight: bold; 
            letter-spacing: 1px;
            color: #222;
        ">
            00Y 000D 00H 00M 00S
        </div>
        
        <div style="font-size: 0.9rem; margin-top: 5px; font-weight: bold; color: #777;">
            (EST. 2140)
        </div>
    </div>
</div>

<style>
    /* Адаптация для мобильных: текст не будет вылезать за края */
    @media screen and (max-width: 600px) {
        #timer-display {
            font-size: 1.4rem !important; /* Уменьшаем только на смартфонах */
        }
        #btc-countdown {
            min-width: 90%;
        }
    }
</style>

<script>
    function updateBtcTimer() {
        const targetDate = new Date("January 1, 2140 00:00:00").getTime();
        const now = new Date().getTime();
        const diff = targetDate - now;

        if (diff < 0) return;

        const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
        const days = Math.floor((diff % (1000 * 60 * 60 * 24 * 365.25)) / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        const format = (num) => String(num).padStart(2, '0');

        document.getElementById("timer-display").innerHTML = 
            years + "Y " + days + "D " + format(hours) + "H " + format(minutes) + "M " + format(seconds) + "S";
    }
    setInterval(updateBtcTimer, 1000);
    updateBtcTimer();
</script>
