<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  /* 0. СИСТЕМНЫЕ УСТАНОВКИ */
  :root {
      color-scheme: dark only;
  }

  /* 1. ШРИФТЫ И ЦВЕТА (СОХРАНЕНО) */
  body, h1, h2, h3, h4, h5, h6, .f1, .f2, .f3, .f4, .f5 {
    font-family: 'JetBrains Mono', monospace !important;
  }
  body, p, h1, h2, h3, h4, h5, h6, a, span, li, blockquote, div {
      font-family: 'Courier New', Courier, monospace !important;
      color: #cd7f32 !important;
  }

  /* 2. ФОН: КАЛИБРОВКА ПОД OLED И СЕТКА */
  html {
      /* Заменяем критичный черный на графитовую базу для стабильности OLED */
      background-color: #141414 !important; 
      background-image:
          /* Слой 1: Сетка (Сохранена логика 4px, но снижена яркость линий для мобильных) */
          repeating-linear-gradient(0deg, rgba(0,0,0,0.18) 0px, rgba(0,0,0,0.18) 2px, transparent 2px, transparent 4px),
          repeating-linear-gradient(90deg, rgba(0,0,0,0.18) 0px, rgba(0,0,0,0.18) 2px, transparent 2px, transparent 4px),
          /* Слой 2: Металлический блик */
          radial-gradient(circle at 50% 50%, rgba(205, 127, 50, 0.08) 0%, transparent 80%),
          /* Слой 3: Глубокий градиент (Смягчен, чтобы убрать ядовитый контраст) */
          linear-gradient(135deg, #121212 0%, #1e140a 40%, #261d14 70%, #121212 100%) !important;
      background-attachment: fixed !important;
      background-size: 4px 4px, 4px 4px, cover, cover !important;
      background-repeat: repeat, repeat, no-repeat, no-repeat !important;
  }
  
  body { background: transparent !important; }

  .bg-black, .bg-white, .bg-near-white, header, main, footer, article, section, .ph3, .pv4 {
      background: transparent !important;
      border: none !important;
  }

  /* 2.1 ОКИСЛЕНИЕ ССЫЛОК (СОХРАНЕНО) */
  a { transition: color 1.2s ease, text-shadow 0.8s ease !important; }
  a:hover {
      color: #4fb3a5 !important; 
      text-shadow: 0 0 5px rgba(79, 179, 165, 0.3);
  }

  /* 3. НАДПИСЬ SLOW LIVING (СОХРАНЕНО) */
  .f3.fw2.hs-headline, header a.f3, header .dib.pv1 { color: transparent !important; position: relative; }
  .f3.fw2.hs-headline::after, header a.f3::after, header .dib.pv1::after {
      content: "Slow Living"; color: #cd7f32 !important; position: absolute; left: 0; top: 0; visibility: visible;
  }

  /* 4. МЕДНЫЙ СКРОЛЛБАР (СОХРАНЕНО) */
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: #1a1a1a; }
  ::-webkit-scrollbar-thumb { background: #8b4513; border: 1px solid #cd7f32; }
  ::-webkit-scrollbar-thumb:hover { background: #cd7f32; }
  * { scrollbar-width: thin; scrollbar-color: #8b4513 #1a1a1a; }

  /* 5. ЛОГОТИП СТРЕКОЗЫ (КОРРЕКЦИЯ ДЛЯ OLED) */
  body::after {
      content: "";
      position: fixed;
      top: 15px;
      right: 15px;
      width: 70px;
      height: 70px;
      z-index: 10;
      pointer-events: none;
      /* Цвета градиента смягчены, чтобы на смартфонах они не превращались в алый */
      background-image: linear-gradient(135deg, #ac6a2e 0%, #8b4513 50%, #4b3621 100%);
      -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 20c-1 0-2 5-2 15s1 45 2 45 2-35 2-45-1-15-2-15zM48 38c-15-5-35-5-35 2s15 8 35 3M52 38c15-5 35-5 35 2s-15 8-35 3M48 48c-12-4-28-4-28 2s12 6 28 2M52 48c12-4 28-4 28 2s-12 6-28 2"/></svg>');
      mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 20c-1 0-2 5-2 15s1 45 2 45 2-35 2-45-1-15-2-15zM48 38c-15-5-35-5-35 2s15 8 35 3M52 38c15-5 35-5 35 2s-15 8-35 3M48 48c-12-4-28-4-28 2s12 6 28 2M52 48c12-4 28-4 28 2s-12 6-28 2"/></svg>');
      -webkit-mask-size: contain;
      mask-size: contain;
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      opacity: 0.6; /* Немного снижена прозрачность для благородного вида */
      filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.9));
  }

  hr {
      border: 0 !important;
      height: 1px !important;
      background: #b87333 !important;
      margin: 2em 0 !important;
      opacity: 0.5 !important;
  }

  /* МОБИЛЬНАЯ ОПТИМИЗАЦИЯ (СТАБИЛИЗАЦИЯ ЦВЕТОВ) */
  @media screen and (max-width: 768px) {
      body, p, h1, h2, a, span {
          /* На смартфонах OLED медь выглядит ярче, поэтому мы ее слегка "пылим" */
          color: #ac6a2e !important; 
      }
      html {
          /* Принудительное смягчение насыщенности для мобильных браузеров */
          filter: saturate(0.9) contrast(1.02);
      }
      h1 {
          font-size: 1.8rem !important;
          word-wrap: break-word !important;
      }
      #SYSTEM-STATUS {
          font-size: 1.4rem !important;
      }
  }

  @media screen and (min-width: 769px) {
      h1 {
          white-space: nowrap !important;
      }
  }

  /* ЭФФЕКТ ТЕРМИНАЛА (СКАНЛАЙН - СОХРАНЕНО) */
  #terminal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
  }
  #terminal-overlay::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
    background-size: 100% 3px;
    opacity: 0.3;
  }
  #terminal-overlay::after {
    content: "";
    position: absolute;
    top: -100px; left: 0;
    width: 100%; height: 100px;
    background: linear-gradient(to bottom, transparent 0%, rgba(255, 255, 255, 0.02) 50%, transparent 100%);
    animation: scanline_move 10s linear infinite;
  }
  @keyframes scanline_move {
    0% { top: -100px; }
    100% { top: 100vh; }
  }
</style>

<script>
  (function() {
    let favicon = document.querySelector('link[rel="icon"]') || document.querySelector('link[rel="shortcut icon"]');
    if (!favicon) {
        favicon = document.createElement('link');
        favicon.rel = 'icon';
        document.getElementsByTagName('head')[0].appendChild(favicon);
    }
    const activeIcon = favicon.href || '/favicon.png'; 
    const staticIcon = '/favicon-static.png';
    const originalTitle = "NESPESHNYE";
    const staticTitle = "[ STATIC ] NESPESHNYE";
    const updateNodeStatus = (status) => {
      if (status === 'active') {
        favicon.href = activeIcon;
        document.title = originalTitle;
      } else {
        favicon.href = staticIcon;
        document.title = staticTitle;
      }
    };
    document.addEventListener('visibilitychange', () => {
      updateNodeStatus(document.hidden ? 'static' : 'active');
    });
  })();
</script>
